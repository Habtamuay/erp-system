name: ERP CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE_BACKEND: ${{ github.repository }}/backend
  DOCKER_IMAGE_FRONTEND: ${{ github.repository }}/frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Create package-lock.json if missing
        run: |
          cd backend
          if [ ! -f package-lock.json ]; then npm install --package-lock-only; fi
          cd ../frontend
          if [ ! -f package-lock.json ]; then npm install --package-lock-only; fi

      - name: Install dependencies
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: Run backend tests
        run: |
          cd backend
          npm run test:unit 2>/dev/null || echo "Unit tests not configured"
          npm run test:integration 2>/dev/null || echo "Integration tests not configured"

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test 2>/dev/null || echo "Frontend tests not configured"
          npm run test:e2e 2>/dev/null || echo "E2E tests not configured"

      - name: Run security scan
        run: |
          cd backend
          npm audit --production 2>/dev/null || echo "No production dependencies to audit"

      - name: Run linting
        run: |
          cd backend && npm run lint 2>/dev/null || echo "Linting not configured"
          cd ../frontend && npm run lint 2>/dev/null || echo "Linting not configured"

  build:
    name: Build and Push
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BACKEND }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_FRONTEND }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/erp
            docker-compose -f docker-compose.staging.yml pull
            docker-compose -f docker-compose.staging.yml up -d --remove-orphans
            docker system prune -f
            sleep 15
            docker exec $(docker ps -q -f name=erp-backend) npx prisma migrate deploy || echo "No migrations to run"
            sleep 10
            curl -f http://localhost/health || echo "Health check pending"

  deploy-production:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.sha }}
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }}
            
            if docker info | grep -q "Swarm: active"; then
              docker service update erp_backend --image ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.sha }} --with-registry-auth
              docker service update erp_frontend --image ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }} --with-registry-auth
            else
              cd /opt/erp-system
              git pull
              docker-compose -f docker-compose.prod.yml down
              docker-compose -f docker-compose.prod.yml build
              docker-compose -f docker-compose.prod.yml up -d
            fi
            
            sleep 30
            BACKEND_CONTAINER=$(docker ps -q -f name=erp_backend)
            if [ -n "$BACKEND_CONTAINER" ]; then
              docker exec $BACKEND_CONTAINER npx prisma migrate deploy || echo "No migrations to run"
            fi
            
            sleep 10
            curl -f https://erp.yourcompany.com/health || exit 1
            
            echo "Deployment successful"

  health-check:
    name: Health Check
    needs: deploy-production
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
      - name: Verify production health
        run: |
          sleep 30
          MAX_RETRIES=12
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -f -s https://erp.yourcompany.com/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check attempt $((RETRY_COUNT+1)) failed. Retrying..."
            sleep 10
            RETRY_COUNT=$((RETRY_COUNT+1))
          done
          
          echo "Health check failed after $MAX_RETRIES attempts"
          exit 1
